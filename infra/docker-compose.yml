name: seyr

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seyr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seyr}
      POSTGRES_DB: ${POSTGRES_DB:-seyr}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seyr}"]
      interval: 5s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-seyr}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-seyr}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-seyr}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
    ports:
      - "8123:8123" # HTTP interface (used by the client)
      - "9000:9000" # native protocol
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_USER:-seyr}", "--password", "${CLICKHOUSE_PASSWORD:-seyr}", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pg_data:
  ch_data:
