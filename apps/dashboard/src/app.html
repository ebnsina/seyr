<!doctype html>
<html lang="en" class="dark">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SEO / social defaults (pages override title + description) -->
		<meta
			name="description"
			content="Privacy-first, cookieless web analytics — a clean, fast alternative to Google Analytics. No cookies, no PII, no banner."
		/>
		<meta name="theme-color" content="#151a14" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="seyr" />
		<meta property="og:title" content="seyr — privacy-first web analytics" />
		<meta
			property="og:description"
			content="The numbers that matter, without the clutter. Cookieless, GDPR-friendly analytics with a sub-1KB script."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og.svg" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="seyr — privacy-first web analytics" />
		<meta
			name="twitter:description"
			content="Cookieless, GDPR-friendly web analytics. The numbers that matter, without the clutter."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/og.svg" />
		<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
		<link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
		<link
			href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=clash-display@500,600,700&display=swap"
			rel="stylesheet"
		/>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
